<svg width="200" height="280" viewBox="0 0 200 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="robotGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9333ea;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Head -->
  <circle cx="100" cy="60" r="35" fill="url(#robotGradient)" filter="url(#glow)" opacity="0.9"/>
  
  <!-- Eyes -->
  <circle cx="85" cy="50" r="6" fill="#00d4ff"/>
  <circle cx="115" cy="50" r="6" fill="#00d4ff"/>
  <circle cx="85" cy="50" r="3" fill="#000"/>
  <circle cx="115" cy="50" r="3" fill="#000"/>
  
  <!-- Nose/VU meter -->
  <rect x="95" y="60" width="10" height="15" rx="2" fill="#9333ea"/>
  <rect x="97" y="62" width="6" height="4" fill="#00d4ff"/>
  
  <!-- Mouth smile -->
  <path d="M 85 75 Q 100 85 115 75" stroke="#00d4ff" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Body/Torso -->
  <rect x="60" y="100" width="80" height="100" rx="10" fill="url(#robotGradient)" filter="url(#glow)" opacity="0.85"/>
  
  <!-- Chest panel with sound wave visualization -->
  <rect x="70" y="115" width="60" height="70" rx="5" fill="transparent" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
  
  <!-- Sound wave bars -->
  <rect x="80" y="140" width="4" height="20" fill="#00d4ff" opacity="0.7"/>
  <rect x="90" y="135" width="4" height="30" fill="#00d4ff" opacity="0.8"/>
  <rect x="100" y="125" width="4" height="40" fill="#00d4ff" opacity="0.9"/>
  <rect x="110" y="135" width="4" height="30" fill="#00d4ff" opacity="0.8"/>
  <rect x="120" y="140" width="4" height="20" fill="#00d4ff" opacity="0.7"/>
  
  <!-- Arms -->
  <g>
    <!-- Left arm -->
    <rect x="30" y="120" width="30" height="15" rx="7" fill="url(#robotGradient)" filter="url(#glow)" opacity="0.85"/>
    <circle cx="30" cy="127" r="8" fill="#9333ea"/>
    <!-- Right arm -->
    <rect x="140" y="120" width="30" height="15" rx="7" fill="url(#robotGradient)" filter="url(#glow)" opacity="0.85"/>
    <circle cx="170" cy="127" r="8" fill="#9333ea"/>
  </g>
  
  <!-- Legs -->
  <g>
    <!-- Left leg -->
    <rect x="70" y="210" width="15" height="50" rx="7" fill="url(#robotGradient)" filter="url(#glow)" opacity="0.8"/>
    <rect x="65" y="255" width="25" height="10" rx="5" fill="#00d4ff" opacity="0.7"/>
    <!-- Right leg -->
    <rect x="115" y="210" width="15" height="50" rx="7" fill="url(#robotGradient)" filter="url(#glow)" opacity="0.8"/>
    <rect x="110" y="255" width="25" height="10" rx="5" fill="#00d4ff" opacity="0.7"/>
  </g>
  
  <!-- Energy aura around robot -->
  <circle cx="100" cy="145" r="90" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.2"/>
  <circle cx="100" cy="145" r="95" fill="none" stroke="#9333ea" stroke-width="1" opacity="0.15"/>
</svg>
