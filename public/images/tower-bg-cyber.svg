<svg width="480" height="960" viewBox="0 0 480 960" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="circuit" x="0" y="0" width="120" height="120" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 60 40 L 20 40 L 20 80 L 100 80 L 100 120" stroke="#00d4ff" stroke-width="1" fill="none" opacity="0.3"/>
      <circle cx="60" cy="40" r="2" fill="#00d4ff" opacity="0.4"/>
      <circle cx="20" cy="40" r="2" fill="#00d4ff" opacity="0.4"/>
    </pattern>
    <linearGradient id="tower" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0920;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a0f35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0920;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="480" height="960" fill="url(#tower)"/>
  <rect width="480" height="960" fill="url(#circuit)"/>
  
  <!-- Vertical lines for structure -->
  <line x1="80" y1="0" x2="80" y2="960" stroke="#00d4ff" stroke-width="1" opacity="0.15"/>
  <line x1="240" y1="0" x2="240" y2="960" stroke="#00d4ff" stroke-width="1" opacity="0.15"/>
  <line x1="400" y1="0" x2="400" y2="960" stroke="#00d4ff" stroke-width="1" opacity="0.15"/>
  
  <!-- Horizontal accent lines -->
  <line x1="0" y1="120" x2="480" y2="120" stroke="#9333ea" stroke-width="2" opacity="0.1"/>
  <line x1="0" y1="360" x2="480" y2="360" stroke="#9333ea" stroke-width="2" opacity="0.1"/>
  <line x1="0" y1="600" x2="480" y2="600" stroke="#9333ea" stroke-width="2" opacity="0.1"/>
  <line x1="0" y1="840" x2="480" y2="840" stroke="#9333ea" stroke-width="2" opacity="0.1"/>
  
  <!-- Corner markers -->
  <circle cx="40" cy="40" r="3" fill="#00d4ff" opacity="0.3"/>
  <circle cx="440" cy="40" r="3" fill="#00d4ff" opacity="0.3"/>
  <circle cx="40" cy="920" r="3" fill="#00d4ff" opacity="0.3"/>
  <circle cx="440" cy="920" r="3" fill="#00d4ff" opacity="0.3"/>
</svg>
